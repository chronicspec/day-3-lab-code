<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Agent - DeepSeek Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0b0b14] text-[#e0e0e6] h-screen flex flex-col font-sans">

    <header class="bg-[#11111e] border-b border-[#222235] px-8 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="text-blue-400 text-2xl"><i class="fa-solid fa-brain"></i></div>
            <div>
                <h1 class="text-md font-bold tracking-wide text-white">AI Travel Agent</h1>
                <p class="text-[11px] text-gray-500 font-mono">DeepSeek Integrated Dynamic ReAct UI</p>
            </div>
        </div>
        <div class="text-xs text-gray-400 bg-[#16162a] border border-[#26263f] px-3 py-1 rounded-full flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-blue-500 animate-ping"></span>
            Agent Ready (Port 8000)
        </div>
    </header>

    <div id="chat-box" class="flex-1 overflow-y-auto px-4 py-8 space-y-6 max-w-4xl w-full mx-auto flex flex-col justify-between">
        
        <div id="chat-messages" class="space-y-6 w-full">
            <div class="flex gap-4 items-start">
                <div class="h-8 w-8 rounded-full bg-blue-500 flex items-center justify-center text-xs font-bold text-white shrink-0 shadow-md">AI</div>
                <div class="space-y-1 w-full">
                    <div class="text-sm text-gray-300 font-medium">Tôi có thể giúp gì cho chuyến đi của bạn hôm nay?</div>
                    <div class="text-xs text-gray-500">Hệ thống đã nhúng chuỗi suy nghĩ sâu ReAct và liên kết các công cụ thực tế.</div>
                </div>
            </div>
        </div>

        <div id="suggestion-container" class="w-full pt-8 grid grid-cols-1 md:grid-cols-2 gap-3 mt-auto">
            
            <button type="button" onclick="selectSuggestion('Lên tour đi Đà Nẵng ngày mai cho 6 người tránh nắng nóng, nhẹ nhàng')" 
                    class="group text-left bg-[#11111e] hover:bg-[#16162a] border border-[#1e1e30] hover:border-[#3b82f6]/50 p-4 rounded-xl transition-all cursor-pointer shadow-sm flex flex-col justify-between h-24">
                <span class="text-xs text-gray-300 font-medium line-clamp-2 group-hover:text-blue-400 transition-colors">Lên tour đi Đà Nẵng ngày mai cho 6 người tránh nắng nóng</span>
                <span class="text-[10px] text-gray-600 flex items-center gap-1 mt-2">Kích hoạt Tool: Weather & Attraction <i class="fa-solid fa-arrow-right text-[8px] opacity-0 group-hover:opacity-100 transition-all transform translate-x-0 group-hover:translate-x-1"></i></span>
            </button>

            <button type="button" onclick="selectSuggestion('Tính ngân sách thuê xe và vé tham quan trọn gói cho đoàn 8 người')" 
                    class="group text-left bg-[#11111e] hover:bg-[#16162a] border border-[#1e1e30] hover:border-[#3b82f6]/50 p-4 rounded-xl transition-all cursor-pointer shadow-sm flex flex-col justify-between h-24">
                <span class="text-xs text-gray-300 font-medium line-clamp-2 group-hover:text-blue-400 transition-colors">Tính ngân sách xe và vé trọn gói cho đoàn 8 người</span>
                <span class="text-[10px] text-gray-600 flex items-center gap-1 mt-2">Kích hoạt Tool: Calculate Budget <i class="fa-solid fa-arrow-right text-[8px] opacity-0 group-hover:opacity-100 transition-all transform translate-x-0 group-hover:translate-x-1"></i></span>
            </button>

            <button type="button" onclick="selectSuggestion('Kiểm tra dự báo thời tiết tại Hội An vào ngày mai xem có mưa không')" 
                    class="group text-left bg-[#11111e] hover:bg-[#16162a] border border-[#1e1e30] hover:border-[#3b82f6]/50 p-4 rounded-xl transition-all cursor-pointer shadow-sm flex flex-col justify-between h-24">
                <span class="text-xs text-gray-300 font-medium line-clamp-2 group-hover:text-blue-400 transition-colors">Kiểm tra dự báo thời tiết tại Hội An vào ngày mai</span>
                <span class="text-[10px] text-gray-600 flex items-center gap-1 mt-2">Kích hoạt Tool: Weather Forecast <i class="fa-solid fa-arrow-right text-[8px] opacity-0 group-hover:opacity-100 transition-all transform translate-x-0 group-hover:translate-x-1"></i></span>
            </button>

            <button type="button" onclick="selectSuggestion('Tìm các điểm tham quan tại Đà Nẵng phù hợp cho gia đình có người lớn tuổi')" 
                    class="group text-left bg-[#11111e] hover:bg-[#16162a] border border-[#1e1e30] hover:border-[#3b82f6]/50 p-4 rounded-xl transition-all cursor-pointer shadow-sm flex flex-col justify-between h-24">
                <span class="text-xs text-gray-300 font-medium line-clamp-2 group-hover:text-blue-400 transition-colors">Điểm tham quan Đà Nẵng cho gia đình có người lớn tuổi</span>
                <span class="text-[10px] text-gray-600 flex items-center gap-1 mt-2">Kích hoạt Tool: Search Attractions <i class="fa-solid fa-arrow-right text-[8px] opacity-0 group-hover:opacity-100 transition-all transform translate-x-0 group-hover:translate-x-1"></i></span>
            </button>

        </div>
    </div>

    <footer class="p-4 bg-[#11111e]/50 border-t border-[#1e1e30]">
        <div class="max-w-4xl w-full mx-auto relative">
            <form id="chat-form" class="flex items-center gap-3 bg-[#11111e] border border-[#2c2c44] rounded-2xl p-2 focus-within:border-blue-500 transition-all">
                <input type="text" id="user-input" autocomplete="off"
                       placeholder="Hỏi Agent về lịch trình du lịch, ngân sách hoặc thời tiết..." 
                       class="flex-1 bg-transparent px-4 py-2.5 text-sm text-white focus:outline-none placeholder-gray-600">
                <button type="submit" id="btn-submit"
                        class="bg-blue-600 hover:bg-blue-500 text-white font-medium p-2.5 rounded-xl transition-all flex items-center justify-center cursor-pointer shadow-lg shadow-blue-600/10 h-10 w-10">
                    <i class="fa-solid fa-arrow-up text-sm"></i>
                </button>
            </form>
            <div class="text-[11px] text-center text-gray-600 mt-2">AI Agent có thể đưa ra các quyết định gọi công cụ tự động dựa trên lập luận thực tế.</div>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
