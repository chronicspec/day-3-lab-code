<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>So sánh AI: Baseline vs Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1 style="text-align: center;">AI Model Comparison</h1>
    <div style="text-align: center; margin-bottom: 20px;">
        <input type="text" id="userInput" placeholder="Nhập yêu cầu tour của bạn...">
        <button id="btn" onclick="compareAI()">So sánh kết quả</button>
    </div>
    <div id="loading" style="display:none;">Đang suy nghĩ... Hệ thống đang chạy vòng lặp ReAct Agent...</div>

    <div class="container">
        <div class="box" id="baselineBox"><h3>Chatbot Baseline</h3><div class="content"></div></div>
        <div class="box" id="agentBox"><h3>ReAct Agent</h3><div class="content"></div></div>
    </div>

    <script>
        async function compareAI() {
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const baselineContent = document.querySelector('#baselineBox .content');
            const agentContent = document.querySelector('#agentBox .content');

            btn.disabled = true;
            loading.style.display = 'block';
            baselineContent.innerText = "Đang xử lý...";
            agentContent.innerText = "Đang xử lý...";

            const res = await fetch('/compare', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({input: document.getElementById('userInput').value})
            });
            const data = await res.json();
            
            baselineContent.innerText = data.baseline;
            agentContent.innerText = data.agent;
            
            btn.disabled = false;
            loading.style.display = 'none';
        }
    </script>
</body>
</html>
